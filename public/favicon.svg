<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer Rounded Container -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Graduation Cap (Diamond Top) -->
  <path d="M256 100 L420 180 L256 260 L92 180 Z" fill="url(#accentGrad)" />
  
  <!-- Cap Base (Neck) -->
  <path d="M170 215 L170 320 C170 370, 342 370, 342 320 L342 215" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" />
  
  <!-- Tassel -->
  <path d="M380 185 L380 290 C380 305, 395 305, 395 290" fill="none" stroke="#38bdf8" stroke-width="12" stroke-linecap="round" />
  <circle cx="395" cy="300" r="16" fill="#38bdf8" />
  
  <!-- Success / Enrollment Checkmark in the center -->
  <path d="M205 240 L245 280 L315 200" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
</svg>